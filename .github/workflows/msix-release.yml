name: MSIX Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-msix:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Rust Project
        run: cargo build --release

      - name: Prepare Assets
        shell: pwsh
        run: |
          mkdir msix_build/Assets -Force
          copy target\release\Nuke.exe msix_build\
          copy msix_assets\AppxManifest.xml msix_build\
          # Generate placeholder assets if missing
          $Assets = @("StoreLogo.png", "Square150x150Logo.png", "Square44x44Logo.png", "Wide310x150Logo.png", "SplashScreen.png")
          foreach ($Asset in $Assets) {
              $Path = "msix_build\Assets\$Asset"
              if (!(Test-Path $Path)) {
                  New-Item -ItemType File -Path $Path -Value "fake" | Out-Null
              }
          }

      - name: Pack MSIX
        shell: pwsh
        run: |
          $makeappx = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\makeappx.exe"
          & $makeappx pack /d msix_build /p Nuke-v0.1.0-x64.msix /o

      - name: Sign MSIX
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}
        run: |
          if (-not $env:PFX_BASE64) {
            Write-Host "No PFX secret found, skipping signing."
            exit 0
          }
          $pfxPath = "GitHubCert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:PFX_BASE64))
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\signtool.exe"
          & $signtool sign /fd SHA256 /a /f $pfxPath /p $env:PFX_PASSWORD Nuke-v0.1.0-x64.msix

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nuke-MSIX
          path: Nuke-v0.1.0-x64.msix

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Nuke-v0.1.0-x64.msix
