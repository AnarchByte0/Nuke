name: Multi-Platform Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          # Windows x86
          - target: i686-pc-windows-msvc
            os: windows-latest
          # Windows ARM64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
          # Linux x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          # Linux x86
          - target: i686-unknown-linux-gnu
            os: ubuntu-22.04
          # Linux ARM64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm64
          # macOS Universal
          - target: universal-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'x86_64-apple-darwin aarch64-apple-darwin' || matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # -----------------------------------------------------------------------
      # LINUX DEPENDENCIES
      # -----------------------------------------------------------------------
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "i686-unknown-linux-gnu" ]; then
            sudo dpkg --add-architecture i386
            sudo apt-get update
            sudo apt-get install -y gcc-multilib libgtk-3-dev:i386 libsoup2.4-dev:i386 libwebkit2gtk-4.0-dev:i386 libjavascriptcoregtk-4.0-dev:i386
          elif [ "${{ matrix.os }}" = "ubuntu-24.04-arm64" ]; then
            sudo apt-get install -y libgtk-3-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev
          else
            # Try both 4.0 and 4.1 for standard Linux x64
            sudo apt-get install -y libgtk-3-dev libsoup2.4-dev libwebkit2gtk-4.0-dev libjavascriptcoregtk-4.0-dev || \
            sudo apt-get install -y libgtk-3-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev
          fi

      # -----------------------------------------------------------------------
      # BUILD PROCESS
      # -----------------------------------------------------------------------
      - name: Install cargo-dist (Latest)
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/latest/download/cargo-dist-installer.sh | sh

      - name: Build & Package
        shell: bash
        env:
          PFX_BASE64: ${{ secrets.PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}
        run: |
          if [ "$RUNNER_OS" == "Windows" ] && [ -n "$PFX_BASE64" ]; then
            echo "$PFX_BASE64" | base64 -d > Nuke.pfx
          fi
          # Use local dist if installed in home
          DIST_BIN="$HOME/.cargo/bin/dist"
          if [ ! -f "$DIST_BIN" ]; then DIST_BIN="dist"; fi
          $DIST_BIN build --tag=${{ github.ref_name }} --target=${{ matrix.target }} --output-format=json > dist-manifest.json

      # -----------------------------------------------------------------------
      # MANUAL NSIS FOR WINDOWS (Fallback if dist fails to provide it)
      # -----------------------------------------------------------------------
      - name: Manual NSIS Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "installer.nsi") {
            makensis /DVERSION=${{ github.ref_name }} installer.nsi
            Move-Item "Nuke-*-Setup.exe" "target/distrib/" -ErrorAction SilentlyContinue
          }

      # -----------------------------------------------------------------------
      # SIGNING
      # -----------------------------------------------------------------------
      - name: Sign Windows Artifacts
        if: runner.os == 'Windows' && env.PFX_BASE64 != ''
        shell: pwsh
        run: |
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\signtool.exe"
          Get-ChildItem -Path target/distrib/ -Include *.exe, *.msi -Recurse | ForEach-Object {
            Write-Host "Signing $($_.FullName)"
            & $signtool sign /fd SHA256 /a /f Nuke.pfx /p "${{ secrets.PFX_PASSWORD }}" $_.FullName
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Nuke-${{ matrix.target }}
          path: target/distrib/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/distrib/*
          token: ${{ secrets.GITHUB_TOKEN }}
