name: Multi-Platform Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: i686-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: i686-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "i686-unknown-linux-gnu" ]; then
            sudo dpkg --add-architecture i386
            sudo apt-get update
            sudo apt-get install -y \
              gcc-multilib \
              libgtk-3-dev:i386 \
              libsoup-3.0-dev:i386 \
              libwebkit2gtk-4.1-dev:i386 \
              libjavascriptcoregtk-4.1-dev:i386 \
              pkg-config
          else
            sudo apt-get install -y \
              libgtk-3-dev \
              libsoup-3.0-dev \
              libwebkit2gtk-4.1-dev \
              libjavascriptcoregtk-4.1-dev
          fi

      - name: Install Tools (dist & packager)
        shell: bash
        run: |
          # Install cargo-dist
          if [ "$RUNNER_OS" == "Windows" ]; then
            powershell -ExecutionPolicy Bypass -c "irm https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.ps1 | iex"
          else
            curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh
          fi
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          
          # Install cargo-packager
          cargo install cargo-packager --locked

      - name: Build & Package (Technical & Official)
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}
          PKG_CONFIG_ALLOW_CROSS: 1
        run: |
          $target = "${{ matrix.target }}"
          $os = "${{ matrix.os }}"
          $ver = "${{ github.ref_name }}".TrimStart('v')
          
          # 1. Setup Cert
          if ($env:PFX_BASE64) {
            [IO.File]::WriteAllBytes("Nuke.pfx", [Convert]::FromBase64String($env:PFX_BASE64))
          }
          
          # 2. Run Technical Build (cargo-dist)
          if ($target -eq "i686-unknown-linux-gnu") {
            $env:PKG_CONFIG_PATH = "/usr/lib/i386-linux-gnu/pkgconfig"
          }
          & dist build --tag=${{ github.ref_name }} --target=$target --output-format=json > dist-manifest.json
          
          # 3. Run Official Build (cargo-packager)
          # Select formats based on OS
          $formats = "nsis,wix"
          if ($os -match "ubuntu") { $formats = "deb" }
          if ($os -match "macos") { $formats = "dmg" }
          
          Write-Host "Packaging for formats: $formats"
          & cargo packager --release --target $target --formats $formats
          
          # 4. Prepare Final Artifacts
          New-Item -Path "target/final_dist" -ItemType Directory -Force
          
          # Copy technical binaries from dist
          if (Test-Path "target/dist") {
            Get-ChildItem -Path target/dist/ -Recurse | Where-Object { ! $_.PSIsContainer } | ForEach-Object {
              Copy-Item $_.FullName "target/final_dist/" -Force
            }
          }
          
          # Copy and rename official installers from packager
          if (Test-Path "target/release/bundle") {
            Get-ChildItem -Path target/release/bundle/ -Recurse | Where-Object { ! $_.PSIsContainer } | ForEach-Object {
              $ext = $_.Extension
              $newFileName = "Nuke-$ver-$target$ext"
              
              if ($_.FullName -like "*nsis*") { $newFileName = "Nuke-$ver-$target-Setup.exe" }
              if ($_.FullName -like "*wix*") { $newFileName = "Nuke-$ver-$target.msi" }
              
              Write-Host "Processing: $($_.Name) -> $newFileName"
              
              # Sign if Windows
              if ($os -match "windows" -and (".exe", ".msi" -contains $ext) -and $env:PFX_BASE64) {
                  $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\" -Filter "signtool.exe" -Recurse | Sort-Object -Property LastWriteTime -Descending | Select-Object -First 1
                  if ($signtool) {
                    & $signtool.FullName sign /fd SHA256 /a /f Nuke.pfx /p $env:PFX_PASSWORD $_.FullName
                  }
              }
              
              Copy-Item $_.FullName "target/final_dist/$newFileName" -Force
            }
          }

      - name: Upload & Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/final_dist/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
