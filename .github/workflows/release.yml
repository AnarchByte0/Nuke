name: Multi-Platform Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch: x64
          # Windows x86
          - target: i686-pc-windows-msvc
            os: windows-latest
            arch: x86
          # Windows ARM64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            arch: arm64
          # Linux x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          # Linux x86 (32-bit)
          - target: i686-unknown-linux-gnu
            os: ubuntu-22.04
          # Linux ARM64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm64
          # macOS Universal
          - target: universal-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'x86_64-apple-darwin aarch64-apple-darwin' || matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # -----------------------------------------------------------------------
      # LINUX DEPENDENCIES
      # -----------------------------------------------------------------------
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "i686-unknown-linux-gnu" ]; then
            sudo dpkg --add-architecture i386
            sudo apt-get update
            # Use 22.04 compatible 32-bit libs
            sudo apt-get install -y gcc-multilib libgtk-3-dev:i386 libsoup2.4-dev:i386 libwebkit2gtk-4.0-dev:i386
          elif [ "${{ matrix.os }}" = "ubuntu-24.04-arm64" ]; then
            sudo apt-get install -y libgtk-3-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev
          else
            # Ubuntu 22.04 defaults
            sudo apt-get install -y libgtk-3-dev libsoup2.4-dev libwebkit2gtk-4.0-dev libjavascriptcoregtk-4.0-dev
          fi

      # -----------------------------------------------------------------------
      # WINDOWS BUILD & MSIX
      # -----------------------------------------------------------------------
      - name: Build & Package Windows (MSIX)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}
        run: |
          cargo build --release --target ${{ matrix.target }}
          $ver = "${{ github.ref_name }}".TrimStart('v')
          $msixName = "Nuke-$ver-${{ matrix.target }}.msix"
          mkdir msix_build/Assets -Force
          copy target\${{ matrix.target }}\release\Nuke.exe msix_build\
          $manifest = Get-Content msix_assets\AppxManifest.xml -Raw
          $manifest = $manifest.Replace("ARCH_PLACEHOLDER", "${{ matrix.arch }}")
          $manifest | Set-Content msix_build\AppxManifest.xml
          $Assets = @("StoreLogo.png", "Square150x150Logo.png", "Square44x44Logo.png", "Wide310x150Logo.png", "SplashScreen.png")
          foreach ($Asset in $Assets) {
              $Path = "msix_build\Assets\$Asset"
              if (!(Test-Path $Path)) { New-Item -ItemType File -Path $Path -Value "fake" | Out-Null }
          }
          $makeappx = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\makeappx.exe"
          & $makeappx pack /d msix_build /p $msixName /o
          if ($env:PFX_BASE64) {
            $pfxPath = "GitHubCert.pfx"
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:PFX_BASE64))
            $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\signtool.exe"
            & $signtool sign /fd SHA256 /a /f $pfxPath /p $env:PFX_PASSWORD $msixName
          }
          echo "ARTIFACT_PATH=$msixName" >> $env:GITHUB_ENV

      # -----------------------------------------------------------------------
      # LINUX BUILD & DEB
      # -----------------------------------------------------------------------
      - name: Build & Package Linux (DEB)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cargo install cargo-deb
          cargo build --release --target ${{ matrix.target }}
          VERSION="${GITHUB_REF_NAME#v}"
          FILENAME="Nuke-$VERSION-${{ matrix.target }}.deb"
          cargo deb --target ${{ matrix.target }} --no-build -o $FILENAME
          echo "ARTIFACT_PATH=$FILENAME" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # MACOS BUILD & DMG
      # -----------------------------------------------------------------------
      - name: Build & Package macOS (DMG)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          mkdir -p "Nuke.app/Contents/MacOS"
          lipo -create target/x86_64-apple-darwin/release/Nuke target/aarch64-apple-darwin/release/Nuke -output "Nuke.app/Contents/MacOS/Nuke"
          chmod +x "Nuke.app/Contents/MacOS/Nuke"
          VERSION="${GITHUB_REF_NAME#v}"
          FILENAME="Nuke-$VERSION-macOS-Universal.dmg"
          hdiutil create -volname "Nuke Installer" -srcfolder "Nuke.app" -ov -format UDZO $FILENAME
          echo "ARTIFACT_PATH=$FILENAME" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # COMMON UPLOAD & RELEASE
      # -----------------------------------------------------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nuke-${{ matrix.target }}
          path: ${{ env.ARTIFACT_PATH }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT_PATH }}
          token: ${{ secrets.GITHUB_TOKEN }}
