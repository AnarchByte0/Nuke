name: Multi-Platform Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: i686-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: i686-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm64
          - target: universal-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'x86_64-apple-darwin aarch64-apple-darwin' || matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "i686-unknown-linux-gnu" ]; then
            sudo dpkg --add-architecture i386
            sudo apt-get update
            sudo apt-get install -y gcc-multilib libgtk-3-dev:i386 libsoup2.4-dev:i386 libwebkit2gtk-4.0-dev:i386 libjavascriptcoregtk-4.0-dev:i386
          elif [ "${{ matrix.os }}" = "ubuntu-24.04-arm64" ]; then
            sudo apt-get install -y libgtk-3-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev
          else
            sudo apt-get install -y libgtk-3-dev libsoup2.4-dev libwebkit2gtk-4.0-dev libjavascriptcoregtk-4.0-dev || \
            sudo apt-get install -y libgtk-3-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev
          fi

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build Project
        run: cargo build --release --target ${{ matrix.target == 'universal-apple-darwin' && 'x86_64-apple-darwin' || matrix.target }}

      # For Universal macOS, we need to build the second arch and then use lipo
      - name: Build macOS Second Arch (Universal Only)
        if: matrix.target == 'universal-apple-darwin'
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package Application
        shell: bash
        env:
          PFX_BASE64: ${{ secrets.PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}
        run: |
          # 1. Sign cert setup for Windows
          if [ "$RUNNER_OS" == "Windows" ] && [ -n "$PFX_BASE64" ]; then
            echo "$PFX_BASE64" | base64 -d > Nuke.pfx
          fi
          
          # 2. Run packager
          if [ "${{ matrix.target }}" = "universal-apple-darwin" ]; then
            # Packager handles universal bundles if configured, or we do it manually
            # For now, let's use the standard release targets
            cargo packager --release --target x86_64-apple-darwin
          else
            cargo packager --release --target ${{ matrix.target }}
          fi

      - name: Sign Windows Installers
        if: runner.os == 'Windows' && env.PFX_BASE64 != ''
        shell: pwsh
        run: |
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\signtool.exe"
          Get-ChildItem -Path target/release/bundle/ -Include *.exe, *.msi -Recurse | ForEach-Object {
            Write-Host "Signing $($_.FullName)"
            & $signtool sign /fd SHA256 /a /f Nuke.pfx /p "${{ secrets.PFX_PASSWORD }}" $_.FullName
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Nuke-${{ matrix.target }}
          path: target/release/bundle/*

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/bundle/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
