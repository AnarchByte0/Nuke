name: Multi-Platform Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: .exe
          - target: i686-pc-windows-msvc
            os: windows-latest
            ext: .exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            ext: .exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            ext: .deb
          - target: i686-unknown-linux-gnu
            os: ubuntu-22.04
            ext: .deb
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm64
            ext: .deb
          - target: universal-apple-darwin
            os: macos-latest
            ext: .dmg

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'x86_64-apple-darwin aarch64-apple-darwin' || matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "i686-unknown-linux-gnu" ]; then
            sudo dpkg --add-architecture i386
            sudo apt-get update
            sudo apt-get install -y gcc-multilib libgtk-3-dev:i386 libsoup2.4-dev:i386 libwebkit2gtk-4.0-dev:i386 libjavascriptcoregtk-4.0-dev:i386
          elif [ "${{ matrix.os }}" = "ubuntu-24.04-arm64" ]; then
            sudo apt-get install -y libgtk-3-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev
          else
            sudo apt-get install -y libgtk-3-dev libsoup2.4-dev libwebkit2gtk-4.0-dev libjavascriptcoregtk-4.0-dev || \
            sudo apt-get install -y libgtk-3-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev
          fi

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build Project
        run: cargo build --release --target ${{ matrix.target == 'universal-apple-darwin' && 'x86_64-apple-darwin' || matrix.target }}

      - name: Build macOS Second Arch (Universal Only)
        if: matrix.target == 'universal-apple-darwin'
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package & Rename Artifacts
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}
        run: |
          # 1. Setup Cert
          if ("${{ runner.os }}" -eq "Windows" -and $env:PFX_BASE64) {
            [IO.File]::WriteAllBytes("Nuke.pfx", [Convert]::FromBase64String($env:PFX_BASE64))
          }
          
          # 2. Run Packager
          if ("${{ matrix.target }}" -eq "universal-apple-darwin") {
             cargo packager --release --target x86_64-apple-darwin
          } else {
             cargo packager --release --target ${{ matrix.target }}
          }
          
          # 3. Create Final Release Dir
          mkdir final_artifacts -Force
          $ver = "${{ github.ref_name }}".TrimStart('v')
          
          # 4. Find and Rename Files to technical format (Nuke-Version-Target.ext)
          Get-ChildItem -Path target/release/bundle/ -Recurse | Where-Object { ! $_.PSIsContainer } | ForEach-Object {
              $ext = $_.Extension
              $newFileName = "Nuke-$ver-${{ matrix.target }}$ext"
              
              # Handle NSIS vs MSI specific naming if both exist
              if ($_.FullName -like "*nsis*") { $newFileName = "Nuke-$ver-${{ matrix.target }}-Setup.exe" }
              if ($_.FullName -like "*wix*") { $newFileName = "Nuke-$ver-${{ matrix.target }}.msi" }
              
              Write-Host "Processing: $($_.Name) -> $newFileName"
              
              # Sign if Windows
              if ("${{ runner.os }}" -eq "Windows" -and (".exe", ".msi" -contains $ext) -and $env:PFX_BASE64) {
                  $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\signtool.exe"
                  & $signtool sign /fd SHA256 /a /f Nuke.pfx /p $env:PFX_PASSWORD $_.FullName
              }
              
              Copy-Item $_.FullName "final_artifacts/$newFileName" -Force
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Nuke-${{ matrix.target }}
          path: final_artifacts/*

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: final_artifacts/*
          token: ${{ secrets.GITHUB_TOKEN }}
