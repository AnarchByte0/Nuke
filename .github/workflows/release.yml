name: Multi-Platform Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: i686-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: i686-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "i686-unknown-linux-gnu" ]; then
            sudo dpkg --add-architecture i386
            sudo apt-get update
            sudo apt-get install -y \
              gcc-multilib \
              libgtk-3-dev:i386 \
              libsoup-3.0-dev:i386 \
              libwebkit2gtk-4.1-dev:i386 \
              libjavascriptcoregtk-4.1-dev:i386 \
              pkg-config
          else
            sudo apt-get install -y \
              libgtk-3-dev \
              libsoup-3.0-dev \
              libwebkit2gtk-4.1-dev \
              libjavascriptcoregtk-4.1-dev
          fi

      - name: Install dist
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.43.0/cargo-dist-installer.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build & Package
        shell: bash
        env:
          PFX_BASE64: ${{ secrets.PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}
          PKG_CONFIG_ALLOW_CROSS: 1
        run: |
          if [ "${{ matrix.target }}" = "i686-unknown-linux-gnu" ]; then
            export PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig
          fi
          if [ "$RUNNER_OS" == "Windows" ] && [ -n "$PFX_BASE64" ]; then
            echo "$PFX_BASE64" | base64 -d > Nuke.pfx
          fi
          # Run official dist build
          dist build --tag=${{ github.ref_name }} --target=${{ matrix.target }} --output-format=json > dist-manifest.json

      # Signing Windows files (EXE and MSI)
      - name: Sign Windows Artifacts
        if: runner.os == 'Windows' && env.PFX_BASE64 != ''
        shell: pwsh
        run: |
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\signtool.exe"
          Get-ChildItem -Path target/distrib/ -Include *.exe, *.msi -Recurse | ForEach-Object {
            & $signtool sign /fd SHA256 /a /f Nuke.pfx /p "${{ secrets.PFX_PASSWORD }}" $_.FullName
          }

      - name: Upload & Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/distrib/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
