[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# Use the latest version which supports NSIS
cargo-dist-version = "0.43.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["nsis", "msi", "powershell", "shell"]
# Target platforms to build apps for
targets = [
  "x86_64-pc-windows-msvc", 
  "i686-pc-windows-msvc", 
  "aarch64-pc-windows-msvc",
  "x86_64-unknown-linux-gnu", 
  "i686-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin", 
  "aarch64-apple-darwin"
]
# Force technical naming for all artifacts
archive-name = "Nuke-{{version}}-{{target}}"
# Ensure we get direct .exe and .msi files with full names
allow-uncompressed-binaries = true
