[package]
name = "Nuke"
version = "0.1.0"
edition = "2024"
authors = ["AnarchByte"]
description = "Nuke"
repository = "https://github.com/AnarchByte/Nuke"

[[bin]]
name = "Nuke"
path = "src/main.rs"

[dependencies]
wry = "0.47"
tao = "0.30"
include_dir = { version = "0.7", features = ["glob"] }
axoupdater = "0.10"
mime_guess = "2.0"
tokio = { version = "1", features = ["full"] }
once_cell = "1.19"

[build-dependencies]
winres = "0.1"

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
