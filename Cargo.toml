[package]
name = "Nuke"
version = "0.1.0"
edition = "2024"
authors = ["AnarchByte"]
description = "Nuke"

[[bin]]
name = "Nuke"
path = "src/main.rs"

[dependencies]
wry = "0.47"
tao = "0.30"
include_dir = { version = "0.7", features = ["glob"] }
axoupdater = "0.10"
mime_guess = "2.0"
tokio = { version = "1", features = ["full"] }
once_cell = "1.19"

[build-dependencies]
winres = "0.1"

[package.metadata.dist]
# Config for cargo-dist
dist = true
formula = "Nuke"
project-name = "Nuke"
# This helps in naming the archives/installers
archive-name = "Nuke-{{version}}-{{target}}"
targets = ["x86_64-pc-windows-msvc", "x86_64-unknown-linux-gnu", "aarch64-apple-darwin", "x86_64-apple-darwin"]
installers = ["msi", "powershell", "shell"]
archive-format = "tar.gz"
# To allow uncompressed binaries for Windows (direct .exe files in releases)
allow-uncompressed-binaries = true
